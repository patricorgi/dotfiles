# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @vim_navigator_mapping_left "M-h"
set -g @vim_navigator_mapping_right "M-l"
set -g @vim_navigator_mapping_up "M-k"
set -g @vim_navigator_mapping_down "M-j"

# Status line
set -g status-position top
set -g status-justify absolute-centre
set -g status-bg '#1e1e2e'
set -g status-fg '#cdd6f4'

# Keep the tail of the current path visible in the status line.
set -g status-left '#[fg=#cba6f7] #S#[fg=black] ⟩ #(echo "#{pane_current_path}" \
  | sed "s|^$HOME|~|" \
  | awk -F/ '\''{
      n = NF
      if (n > 3)
        path = $(n-2)"/"$(n-1)"/"$n
      else
        path = $0

      max = 15

      if (length(path) > max)
        print ".." substr(path, length(path) - max + 4)
      else
        print path
  }'\'') '
set -g status-left-length 0

set -g status-right "#(/Users/patricorgi/dotfiles/scripts/tmux_condor_status.sh) #{cpu_fg_color} 󰻠 #{cpu_percentage} 󰍛 #(awk '/MemTotal/ { total = $2 } /MemAvailable/ { available = $2 } END { if (total > 0) printf \"%.0f%%\", (total - available) * 100 / total }' /proc/meminfo)#{?#{==:#{gpu_percentage},No GPU},, #{gpu_fg_color}  #{gpu_percentage}%}#[default] #{?#{==:#{HOSTICON},},,#{HOSTICON} }#{host_short}"

set -g copy-mode-match-style 'fg=#1e1e2e,bg=#cdd6f4'
set -g copy-mode-current-match-style 'fg=#1e1e2e,bg=#d20f39'

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#f9e2af'

set -g window-status-style 'fg=#585b70,bg=#1e1e2e'
set -g window-status-current-style 'fg=#cba6f7,bg=#1e1e2e,bold'
set -g window-status-last-style 'fg=#585b70,bg=#1e1e2e'
set -g window-status-activity-style 'fg=#585b70,bg=#1e1e2e'
set -g window-status-bell-style 'fg=#585b70,bg=#1e1e2e'

set -g window-status-format "#{window_index} #W#{?window_zoomed_flag, ,  }"
set -g window-status-current-format "#{window_index} #W#{?window_zoomed_flag, ,  }"

# Options
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -sa terminal-features ',xterm-kitty:RGB'

set -g cursor-style block
set -g mouse on
set -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g mode-keys vi
set-option -g allow-rename on
set -sg escape-time 0
set -sg repeat-time 0

set -g allow-passthrough on
set -g set-clipboard on
set -ga update-environment DISPLAY
set -ga update-environment XAUTHORITY
set -ga update-environment SSH_CONNECTION
set -ga update-environment SSH_TTY
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Keybindings
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
bind o show-options -g

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Y send-keys -X copy-end-of-line

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

unbind-key -T root C-h
unbind-key -T root C-j
unbind-key -T root C-k
unbind-key -T root C-l
unbind-key -T copy-mode-vi C-h
unbind-key -T copy-mode-vi C-j
unbind-key -T copy-mode-vi C-k
unbind-key -T copy-mode-vi C-l

bind c new-window -c "#{pane_current_path}"

bind K send-keys "clear" \; send-keys "Enter" \; clear-history

bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded."
bind s choose-tree -swZ
bind w choose-tree -wZ

bind b copy-mode \; send-keys -X start-of-line \; send-keys -X search-backward "❯"
bind F copy-mode \; send-keys -X start-of-line \; send-keys -X search-backward "FCN="
bind P display-popup -E -w 80% -h 70% '$HOME/dotfiles/scripts/tmux_fzf_visible_paths.sh'
bind y display-popup -E -w 90% -h 80% -d "#{pane_current_path}" yazi

# Pane management
bind i run-shell " \
if [ $(( \$(tmux display -p '8*#{pane_width}-20*#{pane_height}') )) -lt 0 ]; then \
  tmux split-window -v -c '#{pane_current_path}'; \
else \
  tmux split-window -h -c '#{pane_current_path}'; \
fi"

bind -n M-O next-layout

bind -n S-Up resize-pane -U 5
bind -n S-Down resize-pane -D 5
bind -n S-Left resize-pane -L 5
bind -n S-Right resize-pane -R 5

bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# toggles
bind-key Q display-popup -E -w 90% -h 80% -T "HTCondor Queue" \
  "condor_q | less -R"

run '~/.tmux/plugins/tpm/tpm'
