#:schema https://yazi-rs.github.io/schemas/keymap.json

[mgr]
prepend_keymap = [
  # Send the hovered path to the local terminal clipboard through tmux's OSC 52 support.
  { on = [ "c", "p" ], run = "shell -- printf '%s\\n' %h | tmux load-buffer -w -", desc = "Copy file path to clipboard" },
  { on = "<C-c>", run = "close", desc = "Close current tab" },
  { on = "q", run = "plugin autosession-cursor -- save-and-quit", desc = "Save session and quit" },
  { on = "T", run = "plugin toggle-pane max-preview", desc = "Maximize or restore preview pane" },
]
