font_family      family="Maple Mono NF CN"
bold_font        auto
italic_font      auto
bold_italic_font auto
modify_font          cell_width 100%
modify_font          cell_height 100%

font_features        MapleMono-NF-CN-Regular +cv01 +calt
font_features        MapleMono-NF-CN-Light +cv01 +calt
font_features        MapleMono-NF-CN-Bold +cv01 +calt
font_features        MapleMono-NF-CN-Italic +cv01 +calt
font_features        MapleMono-NF-CN-BoldItalic +cv01 +calt
